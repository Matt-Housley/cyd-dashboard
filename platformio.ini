[env:esp32dev]
; Pinned to 5.4.0: this is the newest platform release whose Arduino core and
; framework-espidf are built against the SAME ESP-IDF (4.4.x), which is what a
; combined `arduino, espidf` build requires.  Every 6.x release pairs an
; IDF-4.4-based Arduino core with framework-espidf 5.x, which cannot be
; combined.  Do not bump this without re-checking that pairing.
;
; NOTE: this platform's espidf.py imports pkg_resources, which current
; toolchains no longer provide (Python 3.12 dropped the implicit bundling;
; setuptools removed the module in v81).  One-time fix, for whichever
; interpreter runs pio:
;     ~/.platformio/penv/bin/python -m pip install "setuptools<81"
; See README > Building. A PlatformIO core update can undo it.
platform  = espressif32@5.4.0
board     = esp32dev
framework = arduino, espidf

monitor_speed = 115200
upload_speed  = 460800

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^7.0.0

; Log level comes from sdkconfig.defaults (CONFIG_LOG_DEFAULT_LEVEL_NONE).
;
; The partition table is needed in BOTH places: sdkconfig.defaults
; (CONFIG_PARTITION_TABLE_CUSTOM_FILENAME) determines the table that actually
; gets flashed, while board_build.partitions is what PlatformIO's size check
; reads.  Without this line the check falls back to the board default 1 MB app
; partition and rejects the ~1.28 MB firmware, even though partitions.csv
; allocates 0x1F0000 (1.94 MB) to app0.
board_build.partitions = partitions.csv

; -Werror=all is inherited from the IDF build and deliberately LEFT ON.  It
; initially fired on ten pre-existing snprintf sites whose destination buffers
; could be overrun; those buffers have been widened, so the project builds
; warning-clean and the compiler now catches any new ones.  Do not re-add
; build_unflags to silence it — fix the warning instead.

; Panel dimensions are namespaced (CYD_PANEL_*) rather than the bare
; WIDTH/HEIGHT they used to be.  Now that mbedTLS builds from source, a global
; -DWIDTH collides with its own WIDTH macro in ecp_curves.c.
build_flags =
    -DBOARD_CYD
    -DCYD_PANEL_W=240
    -DCYD_PANEL_H=320
